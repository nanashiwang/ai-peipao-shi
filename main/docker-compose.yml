services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://coach:coach@postgres:5432/coach_mvp
      APP_ENV: docker
      MOCK_AI: "true"
      MOCK_RPA: "true"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./samples:/app/samples:ro
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: coach_mvp
      POSTGRES_USER: coach
      POSTGRES_PASSWORD: coach
    ports:
      - "54321:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "63790:6379"

volumes:
  pgdata:
