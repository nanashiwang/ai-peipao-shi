services:
  api:
    build: .
    image: chongqing-coach:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://coach:coach@postgres:5432/coach_mvp
      APP_ENV: docker
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # 挂载 ark.json（云端定位密钥）——读写：后端「系统设置」在线保存密钥会写回这里持久化
      - ./config:/app/config
      - ./samples:/app/samples:ro

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: coach_mvp
      POSTGRES_USER: coach
      POSTGRES_PASSWORD: coach
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coach -d coach_mvp"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
