services:
  api:
    build: .
    image: chongqing-coach:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_ENV: ${APP_ENV:-pilot}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-coach}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-coach_mvp}
    # 运行时密钥从 .env 注入（.env 已在 .gitignore，不入库）。
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # 挂载 ark.json（云端定位密钥）——读写：后端「系统设置」在线保存密钥会写回这里持久化
      - ./config:/app/config
      - ./samples:/app/samples:ro

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-coach_mvp}
      POSTGRES_USER: ${POSTGRES_USER:-coach}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-coach} -d ${POSTGRES_DB:-coach_mvp}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
